name: 更新热榜数据
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 generate.py
      - name: 生成并发布
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p dist
          cp 热门前100.html dist/
          git add -A
          git commit -m "更新数据 $(date)" || exit 0
          git push

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>热门前100 · 实时行情</title>
<style>
:root{--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Segoe UI',sans-serif;background:#f0f2f5;color:#1d1d1f;overflow-x:hidden}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:16px;padding-top:calc(16px + var(--safe-t));text-align:center;position:sticky;top:0;z-index:20}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px}
.header .sub{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.container{max-width:100%;margin:0 auto;padding:10px 10px calc(10px + var(--safe-b))}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat{background:#fff;border-radius:14px;padding:12px 4px;text-align:center;border:1px solid #eee;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.stat .n{font-size:20px;font-weight:700;color:#1a1a2e}
.stat .n.up{color:#e53935}
.stat .n .dn{color:#27ae60}
.stat .l{font-size:11px;color:#999;margin-top:2px;font-weight:500}
.sector{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden}
.sector-hd{padding:12px 14px;font-size:15px;font-weight:700;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;background:#fafbfc}
.sector-hd .badge{background:#e53935;color:#fff;font-size:14px;padding:2px 10px;border-radius:12px;font-weight:700;min-width:26px;text-align:center}
.stock-list{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px}
.stock-row{display:flex;flex-direction:column;padding:10px 8px;cursor:pointer;background:#fff;border-radius:8px;border:1px solid #e8e8ed}
.stock-row:active{background:#f2f2f7}
.stock-top{display:flex;align-items:center;justify-content:space-between;width:100%}
.stock-rank{font-size:12px;font-weight:700;color:#e53935;flex-shrink:0;min-width:28px}
.stock-name{font-size:13px;font-weight:600;color:#1d1d1f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:center;margin:0 4px}
.stock-chg{text-align:right;font-weight:700;font-size:12px;flex-shrink:0;min-width:52px}
.stock-chg.r{color:#e53935}
.stock-chg.g{color:#27ae60}
.stock-sub{font-size:9px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.ft{color:#999;font-size:11px;text-align:center;padding:14px 16px;padding-bottom:calc(14px + var(--safe-b))}
@media(min-width:600px){.container{max-width:680px;padding:16px}.stats{grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<div class="header"><h1>热门前100</h1><div class="sub"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80"></span> 同花顺实时 · <span id="liveTime">--:--</span></div></div>
<div class="container" id="app"></div>
<div class="ft">热门前100 · 同花顺实时数据</div>
<script>
var DATA = STOCK_DATA;
(function(s){
if(!s||!s.length){document.getElementById('app').innerHTML='暂无数据';return}
var n=new Date();document.getElementById('liveTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
var up=s.filter(function(x){return x.p>0}).length,dn=s.filter(function(x){return x.p<0}).length,zt=s.filter(function(x){return x.p>=9.8}).length,av=(s.reduce(function(a,x){return a+x.p},0)/s.length).toFixed(2);
var g={};s.forEach(function(x){var cn=(x.cs||[''])[0];if(cn){if(!g[cn])g[cn]=[];g[cn].push(x)}});
var e=Object.entries(g).sort(function(a,b){return b[1].length-a[1].length});
var h='<div class="stats"><div class="stat"><div class="n">'+s.length+'</div><div class="l">热门股票</div></div><div class="stat"><div class="n up">'+zt+'</div><div class="l">涨停</div></div><div class="stat"><div class="n up">'+up+'/<span class="dn">'+dn+'</span></div><div class="l">涨/跌</div></div><div class="stat"><div class="n">'+Object.keys(g).length+'</div><div class="l">行业大类</div></div><div class="stat"><div class="n '+(av>=0?'up':'dn')+'">'+av+'%</div><div class="l">平均涨幅</div></div></div>';
e.forEach(function(p){var cn=p[0],ss=p[1];
h+='<div class="sector"><div class="sector-hd"><span>'+cn+'</span><span class="badge">'+ss.length+'只</span></div><ul class="stock-list">';
ss.sort(function(a,b){return a.o-b.o}).forEach(function(x){var cp=x.p||0,cl=cp>0?'r':'g',sg=cp>0?'+':'';h+='<li class="stock-row" onclick="showDetail(\''+x.c+'\')"><div class="stock-top"><span class="stock-rank">#'+x.o+'</span><span class="stock-name">'+(x.n||'-')+'</span><span class="stock-chg '+cl+'">'+sg+cp.toFixed(2)+'%</span></div><span class="stock-sub">'+((x.rc||[])[0]||x.cs[0]||'')+'</span></li>'});
h+='</ul></div>'});
document.getElementById('app').innerHTML=h;
})(DATA.s);
function showDetail(code){var s=DATA.s.find(function(x){return x.c===code});if(!s)return;var p=document.getElementById('detail');if(!p){p=document.createElement('div');p.id='detail';p.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:#fff;overflow-y:auto';document.body.appendChild(p)}p.style.display='block';setTimeout(function(){drawChart(s.c)},300);var cc=s.p>=0?'#ff6b6b':'#27ae60',sg=s.p>=0?'+':'';p.innerHTML='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:16px;padding-top:calc(16px + env(safe-area-inset-top,10px))"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:20px;font-weight:700">'+(s.n||'-')+'</span><span style="font-size:13px;opacity:.6">'+(s.c||'')+'</span><div onclick="closeDetail()" style="margin-left:auto;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer">✕</div></div><div style="display:flex;align-items:baseline;gap:12px"><span style="font-size:32px;font-weight:700">'+(s.q||'--')+'</span><span style="font-size:18px;font-weight:600;color:'+cc+'">'+sg+(s.p||0).toFixed(2)+'%</span></div><div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><span style="background:rgba(255,255,255,.1);padding:4px 12px;border-radius:8px;font-size:12px">热度: <b>#'+s.o+'</b></span><span style="background:rgba(255,255,255,.1);padding:4px 12px;border-radius:8px;font-size:12px">概念: <b>'+((s.rc||[]).slice(0,3).join(' · ')||'--')+'</b></span></div></div><div style="padding:10px;text-align:center;color:#999;font-size:13px;padding-top:40px">日K线图</div><canvas id="k_chart" style="width:100%;display:block"></canvas>'}
function closeDetail(){var el=document.getElementById('detail');if(el)el.style.display='none'}
function drawChart(code){
  var c=document.getElementById('k_chart');if(!c)return;
  var pw=Math.min(window.innerWidth-32,400),dpr=window.devicePixelRatio||1,W=Math.round(pw),H=Math.round(W*3/4);
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#f8f9fa';ctx.fillRect(0,0,W,H);ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('加载中...',W/2,H/2);
  var m=code.startsWith('6')?'sh':'sz';
  fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param='+m+code+',day,,,168')).then(function(r){return r.json()}).then(function(raw){
    var kd=((raw.data||{})[m+code]||{});var ls=kd.day||kd.qfqday||[];if(!ls.length)throw new Error();
    var kl=ls.map(function(l){if(typeof l==='string'){var p=l.split(' ');if(p.length<2)return null;var v=p[1].split(',');return[p[0],+v[0],+v[2],+v[1],+v[3],+v[5]]}return l}).filter(function(x){return x});
    renderK(ctx,W,H,kl);
  }).catch(function(){
    fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol='+m+code+'&scale=240&datalen=168')).then(function(r){return r.json()}).then(function(d){
      if(!d||!d.length){noData();return}
      renderK(ctx,W,H,d.map(function(x){return[x.day,+x.open,+x.close,+x.high,+x.low,+x.volume]}));
    }).catch(function(){noData()});
  });
  function noData(){ctx.fillStyle='#f8f9fa';ctx.fillRect(0,0,W,H);ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('暂无K线数据',W/2,H/2)}
}
function calcMACD(p,f,s){f=f||12;s=s||26;var g=9;function e(d,n){var r=[d[0]],k=2/(n+1);for(var i=1;i<d.length;i++)r.push(d[i]*k+r[i-1]*(1-k));return r}var eF=e(p,f),eS=e(p,s),di=eF.map(function(v,i){return v-eS[i]}),de=e(di,g),h=di.map(function(v,i){return 2*(v-de[i])});return{dif:di,dea:de,hist:h}}
function renderK(ctx,W,H,kl){
  var b=kl.map(function(d){var dt=d[0];if(dt&&dt.indexOf('-')<0&&dt.length===8)dt=dt.substring(0,4)+'-'+dt.substring(4,6)+'-'+dt.substring(6,8);return{d:dt,o:+d[1],c:+d[2],h:+d[3],l:+d[4],v:+d[5]}});
  b.sort(function(a,b){return a.d.localeCompare(b.d)});if(b.length>150)b=b.slice(b.length-150);
  var n=b.length,pa={t:22,b:28,l:48,r:14},tH=H-pa.t-pa.b-4,kH=Math.floor(tH*0.45),vH=Math.floor(tH*0.15),mH=tH-kH-vH,cw=W-pa.l-pa.r;
  var mx=Math.max.apply(null,b.map(function(x){return x.h})),mn=Math.min.apply(null,b.map(function(x){return x.l}));
  if(mx===mn||mx-mn<0.01){mx*=1.02;mn*=0.98}
  var mV=Math.max.apply(null,b.map(function(x){return x.v}))||1,p=b.map(function(x){return x.c}),mc=calcMACD(p),mM=Math.max.apply(null,mc.hist.map(Math.abs))||1;mM*=1.2;
  function xP(i){return pa.l+(i+0.5)/n*cw}function yP(v){return pa.t+kH-(v-mn)/(mx-mn)*kH}
  function yV(v){return pa.t+kH+vH-(v/mV)*vH}function yM(v){return pa.t+kH+vH+mH/2-(v)/(2*mM)*mH}
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=0.5;for(var i=0;i<4;i++){var y=pa.t+kH/4*i;ctx.beginPath();ctx.moveTo(pa.l,y);ctx.lineTo(pa.l+cw,y);ctx.stroke()}
  ctx.beginPath();ctx.moveTo(pa.l,pa.t+kH);ctx.lineTo(pa.l+cw,pa.t+kH);ctx.stroke();
  var y0=yM(0);ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(pa.l,y0);ctx.lineTo(pa.l+cw,y0);ctx.stroke();
  var bw=Math.max(cw/n*0.6,1);
  for(var i=0;i<n;i++){var x=b[i],up=x.c>=x.o,cl=up?'#e53935':'#27ae60',cx=xP(i);ctx.strokeStyle=cl;ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(cx,yP(x.h));ctx.lineTo(cx,yP(x.l));ctx.stroke();var t=Math.min(yP(x.o),yP(x.c)),bt=Math.max(yP(x.o),yP(x.c));ctx.fillStyle=cl;ctx.fillRect(cx-bw/2,t,Math.max(bw,1),Math.max(bt-t,1))}
  for(var i=0;i<n;i++){var x=b[i],up=x.c>=x.o,cl=up?'rgba(229,57,53,0.3)':'rgba(39,174,96,0.3)',cx=xP(i);ctx.fillStyle=cl;ctx.fillRect(cx-bw/2,yV(x.v),Math.max(bw,1),pa.t+kH+vH-yV(x.v))}
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(pa.l,pa.t+kH+vH);ctx.lineTo(pa.l+cw,pa.t+kH+vH);ctx.stroke();
  for(var i=0;i<n;i++){var hv=mc.hist[i],cl=hv>=0?'rgba(229,57,53,0.5)':'rgba(39,174,96,0.5)',cx=xP(i),yh=yM(hv);ctx.fillStyle=cl;ctx.fillRect(cx-bw/2,Math.min(y0,yh),Math.max(bw,1),Math.abs(yh-y0))}
  ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(mx.toFixed(2),pa.l-4,pa.t+12);ctx.fillText(mn.toFixed(2),pa.l-4,pa.t+kH+4);
  ctx.textAlign='center';ctx.fillStyle='#999';ctx.font='9px sans-serif';var step=Math.max(1,Math.floor(n/6));for(var i=0;i<n;i+=step)ctx.fillText(b[i].d,pa.l+(i+0.5)/n*cw,H-6);
}
</script>
</body>
</html>

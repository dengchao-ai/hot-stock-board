<head>

<style>
:root{--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);--safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Segoe UI',sans-serif;background:#f0f2f5;color:#1d1d1f;-webkit-text-size-adjust:100%;overflow-x:hidden}
/* Header */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:18px 16px;padding-top:calc(18px + var(--safe-t));text-align:center;position:sticky;top:0;z-index:20;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header h1{font-size:19px;font-weight:600;letter-spacing:.3px}
.header .sub{font-size:12px;opacity:.7;margin-top:3px;font-weight:400}
/* Container */
.container{max-width:100%;margin:0 auto;padding:10px 10px calc(10px + var(--safe-b))}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat{background:#fff;border-radius:12px;padding:10px 4px;text-align:center;border:1px solid #e8e8ed}
.stat .n{font-size:18px;font-weight:700;color:#1a1a2e;line-height:1.3}
.stat .n.up{color:#d63031}
.stat .n .dn{color:#00b894}
.stat .l{font-size:10px;color:#999;margin-top:1px}
/* Sector */
.sector{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden}
.sector-hd{padding:11px 14px;font-size:14px;font-weight:600;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;background:#fafbfc}
.sector-hd .badge{background:#1a1a2e;color:#fff;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:600}
/* Stock grid - 3 cols */
.stock-list{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:8px}
.stock-row{display:flex;flex-direction:column;padding:8px 6px;cursor:pointer;background:#fff;border-radius:8px;border:1px solid #e8e8ed;overflow:hidden}
.stock-row:active{background:#f2f2f7}
.stock-top{display:flex;align-items:center;width:100%;gap:3px}
.stock-rank{font-size:11px;font-weight:700;color:#d63031;white-space:nowrap;flex-shrink:0}
.stock-name{font-size:12px;font-weight:500;color:#1d1d1f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;line-height:1.3;padding:0 1px}
.stock-chg{text-align:right;font-weight:600;font-size:11px;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.stock-chg.r{color:#d63031}
.stock-chg.g{color:#00b894}
.stock-sub{font-size:9px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;line-height:1.2}
/* Footer */
.ft{color:#999;font-size:11px;text-align:center;padding:14px 16px;padding-bottom:calc(14px + var(--safe-b))}
/* Detail Panel - Fixed bottom sheet on mobile */
#detail{display:none;margin:0;background:#fff;border-left:3px solid #0984e3}
#detail.show{display:block}
#detail.dark{background:#1c1c1e}
.dt-header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:12px 16px;padding-top:8px}
.dt-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dt-name{font-size:17px;font-weight:700}
.dt-code{font-size:12px;opacity:.6;margin-left:2px}
.dt-close{margin-left:auto;width:28px;height:28px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;border:none;color:#fff}
.dt-close:active{background:rgba(255,255,255,.3)}
.dt-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.dt-price{font-size:28px;font-weight:700}
.dt-chg-label{font-size:16px;font-weight:600}
.dt-chg-label.r{color:#ff6b6b}
.dt-chg-label.g{color:#00b894}
.dt-meta{display:flex;gap:6px;flex-wrap:wrap}
.dt-meta span{background:rgba(255,255,255,.1);padding:3px 10px;border-radius:6px;font-size:11px;opacity:.9}
.dt-meta b{font-weight:600}
/* Chart */
.chart-box{padding:6px 8px 0}
/* Responsive: tablets and desktop */
@media(min-width:600px){
.container{max-width:680px;padding:16px}
.stats{grid-template-columns:repeat(5,1fr);gap:10px}
}
@media(min-width:900px){
.container{max-width:900px}
}
/* iOS overscroll fix */
body{overscroll-behavior-y:contain}
/* Smooth animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sector{animation:fadeUp .4s ease both}
.sector:nth-child(2){animation-delay:.05s}
.sector:nth-child(3){animation-delay:.1s}
.sector:nth-child(4){animation-delay:.15s}
.sector:nth-child(5){animation-delay:.2s}
</style>

function calcMACD(prices,f,s,sg){
f=f||12;s=s||26;sg=sg||9;
function ema(d,p){var k=2/(p+1),r=[d[0]];for(var i=1;i<d.length;i++)r.push(d[i]*k+r[i-1]*(1-k));return r}
var e12=ema(prices,f),e26=ema(prices,s);
var ml=e12.map(function(v,i){return v-e26[i]});
var sl=ema(ml,sg);
var hist=ml.map(function(v,i){return v-sl[i]});
return{macd:ml,signal:sl,hist:hist};
}

var cx=xPos(i);
ctx.strokeStyle=col;ctx.lineWidth=0.8;
ctx.beginPath();ctx.moveTo(cx,yPrice(b.h));ctx.lineTo(cx,yPrice(b.l));ctx.stroke();
var top=Math.min(yPrice(b.o),yPrice(b.c)),bot=Math.max(yPrice(b.o),yPrice(b.c));
ctx.fillStyle=col;ctx.fillRect(cx-barW/2,top,Math.max(barW,1),Math.max(bot-top,1));
ctx.fillStyle=isUp?'rgba(214,48,49,.3)':'rgba(0,184,148,.3)';
ctx.fillRect(cx-barW/2,yVol(b.v),Math.max(barW,1),pad.t+kH+vH-yVol(b.v));
}

// MA5
ctx.strokeStyle='#f39c12';ctx.lineWidth=1;ctx.beginPath();var started=false;
for(var i=0;i<n;i++){if(ma5[i]!==null){var px=xPos(i),py=yPrice(ma5[i]);if(!started){ctx.moveTo(px,py);started=true}else ctx.lineTo(px,py)}}
ctx.stroke();
// MA10
ctx.strokeStyle='#9b59b6';ctx.lineWidth=1;ctx.beginPath();started=false;
for(var i=0;i<n;i++){if(ma10[i]!==null){var px=xPos(i),py=yPrice(ma10[i]);if(!started){ctx.moveTo(px,py);started=true}else ctx.lineTo(px,py)}}
ctx.stroke();

// MACD
var y0=yMACD(0);
ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=0.5;
ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+cw,y0);ctx.stroke();
for(var i=0;i<n;i++){
var hv=macd.hist[i];
var col=hv>=0?'rgba(214,48,49,.6)':'rgba(0,184,148,.6)';
var cx=xPos(i);var yh=yMACD(hv);
ctx.fillStyle=col;ctx.fillRect(cx-barW/2,Math.min(y0,yh),Math.max(barW,1),Math.abs(yh-y0));
}

// Labels
ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='right';
ctx.fillText(maxH.toFixed(2),pad.l-4,pad.t+12);ctx.fillText(minL.toFixed(2),pad.l-4,pad.t+kH+4);
ctx.fillStyle='#999';ctx.font='9px sans-serif';
ctx.fillText(maxMACD.toFixed(2),pad.l-4,pad.t+kH+vH+10);ctx.fillText((-maxMACD).toFixed(2),pad.l-4,pad.t+kH+vH+mH-2);
ctx.textAlign='center';ctx.fillStyle='#999';ctx.font='9px sans-serif';
var step=Math.max(1,Math.floor(n/6));
for(var i=0;i<n;i+=step)ctx.fillText(bars[i].d,pad.l+(i+0.5)/n*cw,H-8);
ctx.textAlign='left';ctx.font='9px sans-serif';
ctx.fillStyle='#f39c12';ctx.fillText('MA5',pad.l+cw-55,pad.t+12);
ctx.fillStyle='#9b59b6';ctx.fillText('MA10',pad.l+cw-55,pad.t+24);
}
</script>
